<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>全力オヤジ祭り 会計管理システム</title>
<style>
    :root {
        --bg-color: #050505;
        --accent-color: #0A84FF;
        --text-main: #F2F2F7;
        --text-sub: #8E8E93;
        --success-color: #34C759; /* iOSシステムグリーン */
    }
    *, *::before, *::after { box-sizing: border-box; }
    
    /* 💡 HTMLとBodyの背景を黒塗りから変更し、固定背景が見えるように透過設定 */
    html, body {
        margin: 0; padding: 0; width: 100%; min-height: 100dvh; 
        background-color: var(--bg-color); color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        overflow-x: hidden;
    }
    
    /* 💡 画面全体に赤と緑のグラデーションを完全に固定（スクロールしても背景は動きません） */
    .fixed-bg {
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100vw; 
        height: 100dvh; /* 画面ぴったりに固定 */
        background-image:
            radial-gradient(circle at 10% 20%, rgba(220, 38, 38, 0.25) 0%, transparent 45%),
            radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.25) 0%, transparent 45%),
            radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.9) 0%, #050505 100%);
        background-size: cover; 
        z-index: -1; 
        pointer-events: none;
    }
    
    header {
        position: fixed; top: 0; left: 0; width: 100%;
        padding-top: env(safe-area-inset-top); z-index: 100;
        background: linear-gradient(to bottom, rgba(5, 5, 5, 0.8) 0%, transparent 100%);
        backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    }
    h2 {
        margin: 0; padding: 12px 0 6px 0; font-size: 1.1rem; font-weight: 700;
        text-align: center; text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
    }
    #pageContainer {
        padding: calc(65px + env(safe-area-inset-top)) 12px 20px 12px;
        display: flex; flex-direction: column; align-items: center; width: 100%;
    }
    
    /* 💡 外枠カードは完全に透過したままに */
    .card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0; width: 100%; max-width: 540px;
    }
    
    .list-container { 
        width: 100%; 
        display: grid; 
        grid-template-columns: repeat(2, 1fr); 
        gap: 8px; 
    }
    
    /* 💡 ガラス/リキッド調カード（半透明なので背後のグラデーションが美しく透けます） */
    .member-card {
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(255, 255, 255, 0.07); 
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 12px; 
        padding: 6px 10px; 
        height: 52px;    
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    /* 未支払い以外（支払い済み）の時のグリーンリキッド風スタイル */
    .member-card.paid {
        border-color: rgba(52, 199, 89, 0.5);
        background: rgba(52, 199, 89, 0.15);
        box-shadow: 0 4px 15px rgba(52, 199, 89, 0.15);
    }
    .member-detail { 
        display: flex; flex-direction: column; gap: 0px; 
        overflow: hidden; white-space: nowrap; text-overflow: ellipsis; 
        flex-grow: 1;
        padding-right: 4px;
    }
    .member-name { font-size: 14px; font-weight: 600; color: #FFFFFF; }
    .member-age { font-size: 10px; color: var(--text-sub); }
    
    /* セレクトボックスのガラススタイル調和 */
    .payment-select {
        background-color: rgba(255, 255, 255, 0.12);
        color: var(--text-main);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border-radius: 6px;
        padding: 4px 4px;
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        outline: none;
        max-width: 90px;
        transition: all 0.2s ease;
    }
    /* プルダウンオプションはブラウザの仕様に合わせダークに固定 */
    .payment-select option {
        background-color: #1C1C1E;
        color: #FFFFFF;
    }
    /* 支払い済み状態の時のセレクトボックススタイル */
    .member-card.paid .payment-select {
        border-color: rgba(52, 199, 89, 0.4);
        background-color: rgba(52, 199, 89, 0.25);
    }
    
    /* 入金済みをセンターに強調表示 */
    .summary-box {
        display: flex; justify-content: center; margin-bottom: 15px;
        font-size: 14px; color: var(--text-sub);
        padding-bottom: 8px;
    }
    .summary-item span { color: var(--text-main); font-weight: bold; font-size: 18px; }
    .error-msg { color: #FF453A; text-align: center; margin-top: 20px; }
</style>

</head>
<body>
<!-- グラデーションを映し出す固定背景レイヤー -->
<div class="fixed-bg"></div>
<header>
	<h2>会計管理</h2>
</header>

<div id="pageContainer">
    <div class="card">
        <div class="summary-box">
            <div class="summary-item">入金済: <span id="paidCount" style="color: var(--success-color);">0</span> 名</div>
        </div>
        <div id="errorArea" class="error-msg" style="display: none;">参加者データが見つかりません。QRコードを正しくスキャンしてください。</div>
        <div id="memberList" class="list-container">
            <!-- JavaScriptでここに動的にリストを生成 -->
        </div>
    </div>
</div>

<script>
    // 1. URLパラメータからデータを抽出してデコード
    function getParams() {
        try {
            const href = window.location.href;
            const dataIndex = href.indexOf('data=');
            if (dataIndex === -1) return null;
            
            let rawData = href.substring(dataIndex + 5); 
            
            while (rawData.includes('%')) {
                rawData = decodeURIComponent(rawData);
            }
            
            rawData = rawData.replace(/ /g, '+');
            
            while (rawData.length % 4 !== 0) {
                rawData += '=';
            }
            
            const binaryStr = atob(rawData);
            const len = binaryStr.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }

            const decoder = new TextDecoder('utf-8');
            const jsonStr = decoder.decode(bytes);

            return JSON.parse(jsonStr);
        } catch (e) {
            console.error("データデコードエラー（詳細）:", e);
            return null;
        }
    }

    // 2. 画面の更新処理
    function updateSummary(members) {
        // statusが 'unpaid'（未支払い）以外のメンバーを「入金済」としてカウント
        const paidCount = members.filter(m => m.status !== 'unpaid').length;
        document.getElementById('paidCount').innerText = paidCount;
    }

    // 3. メイン実行ロジック
    window.addEventListener('DOMContentLoaded', () => {
        const memberData = getParams();
        const listContainer = document.getElementById('memberList');
        const errorArea = document.getElementById('errorArea');

        if (!memberData || memberData.length === 0) {
            errorArea.style.display = 'block';
            return;
        }

        // 各メンバーの支払いステータス（status）の初期値を 'unpaid' にセット
        memberData.forEach(m => m.status = 'unpaid');
        updateSummary(memberData);

        // リストの描画
        memberData.forEach((member, index) => {
            const card = document.createElement('div');
            card.className = 'member-card';
            card.id = `member-${index}`;

            card.innerHTML = `
                    <div class="member-detail">
                        <span class="member-name">${member.name || '不明'}</span>
                        ${member.age ? `<span class="member-age">${member.age}</span>` : ''}
                    </div>
                    <select class="payment-select" id="select-${index}">
                        <option value="unpaid">未払い</option>
                        <option value="cash">現金</option>
                        <option value="paypay">PayPay</option>
                        <option value="ticket1000">オヤジ券1000</option>
                        <option value="ticket500">オヤジ券500</option>
                    </select>
                `;

            listContainer.appendChild(card);

            // セレクトボックスの変更イベント
            const select = card.querySelector(`#select-${index}`);
            
            select.addEventListener('change', (e) => {
                const selectedValue = e.target.value;
                member.status = selectedValue;
                
                // 「unpaid（未支払い）」以外なら緑色のアクティブ状態にする
                if (selectedValue !== 'unpaid') {
                    card.classList.add('paid');
                } else {
                    card.classList.remove('paid');
                }
                
                // 集計ボックスを更新
                updateSummary(memberData);
            });
        });
    });
</script>
</body>
</html>
