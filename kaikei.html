<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全力オヤジ祭り 集金管理</title>
    <style>
        :root {
            --primary-navy: #0F172A;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --border-color: #E2E8F0;
            --text-main: #334155;
            --text-sub: #64748B;
            --success: #10B981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            color: var(--primary-navy);
            margin-bottom: 8px;
            text-align: center;
        }

        .summary {
            background: var(--primary-navy);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .summary span {
            font-size: 24px;
            color: #38BDF8;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* タップしやすい大きめの行 */
        .member-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .member-name {
            font-size: 16px;
            font-weight: 600;
        }

        /* 状態を示すバッジ */
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: #F1F5F9;
            color: var(--text-sub);
        }

        /* 払い済み（チェック時）のスタイル */
        .member-row.paid {
            border-color: var(--success);
            background: #F0FDF4;
        }

        .member-row.paid .status-badge {
            background: var(--success);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💰 大会集金管理</h1>
    <div class="summary">
        回収状況: <span id="paid-count">0</span> / <span id="total-count">0</span> 人
    </div>

    <div class="member-list" id="member-list">
        <!-- JSでここにメンバーが並びます -->
    </div>
</div>

<script>
    // 1. URLのパラメータからメンバーリストを取得
    const urlParams = new URLSearchParams(window.location.search);
    const membersParam = urlParams.get('members');
    
    let members = [];
    if (membersParam) {
        members = decodeURIComponent(membersParam).split(',');
    }

    // 2. ローカルストレージから現在の集金状況（済みの人リスト）を読み込む
    // URLごとに一意にするため、メンバーの文字列をキーのハッシュ代わりに使う
    const storageKey = `kaikei_paid_${btoa(unescape(encodeURIComponent(membersParam || ''))).substring(0,10)}`;
    let paidMembers = JSON.parse(localStorage.getItem(storageKey)) || [];

    const listContainer = document.getElementById('member-list');
    
    // 3. 画面の初期描画
    if (members.length === 0) {
        listContainer.innerHTML = '<p style="text-align:center; color:var(--text-sub);">メンバーデータがありません。大会アプリからURLを再生成してください。</p>';
    } else {
        document.getElementById('total-count').textContent = members.length;
        renderList();
    }

    function renderList() {
        listContainer.innerHTML = '';
        let paidCount = 0;

        members.forEach(name => {
            const isPaid = paidMembers.includes(name);
            if (isPaid) paidCount++;

            const row = document.createElement('div');
            row.className = `member-row ${isPaid ? 'paid' : ''}`;
            row.innerHTML = `
                <div class="member-name">${name}</div>
                <div class="status-badge">${isPaid ? '済' : '未納'}</div>
            `;

            // タップした時の切り替え処理
            row.onclick = () => togglePaid(name);
            listContainer.appendChild(row);
        });

        document.getElementById('paid-count').textContent = paidCount;
    }

    function togglePaid(name) {
        if (paidMembers.includes(name)) {
            // すでに「済」なら「未納」に戻す
            paidMembers = paidMembers.filter(m => m !== name);
        } else {
            // 「未納」なら「済」にする
            paidMembers.push(name);
        }
        // ローカルストレージに保存して再描画
        localStorage.setItem(storageKey, JSON.stringify(paidMembers));
        renderList();
    }
</script>
</body>
</html>
